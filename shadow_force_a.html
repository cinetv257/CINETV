
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecteur Vidéo Personnalisé</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player-container {
      position: relative;
      width: 100%;
      max-width: 800px;
    }

    video {
      width: 100%;
      height: auto;
      border: 2px solid #00ffcc;
      border-radius: 8px;
    }

    .fullscreen-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background-color: rgba(0, 0, 0, 0.6);
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .fullscreen-btn:hover {
      background-color: #00ffcc;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="player-container">
    <video id="video" controls autoplay>
<source src="https://vz-13842704-b8f.b-cdn.net/ba417d01-b581-46b0-807f-ae39773f4f4f/play_720p.mp4" type="video/mp4">
      Votre navigateur ne prend pas en charge la vidéo HTML5.
    </video>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">Plein écran</button>
  </div>

  <script>
    function toggleFullscreen() {
      const video = document.getElementById('video');
      if (video.requestFullscreen) {
        video.requestFullscreen();
      } else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
      } else if (video.msRequestFullscreen) {
        video.msRequestFullscreen();
      }
    }
  </script>
</body>
</html>
