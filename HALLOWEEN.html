    <style>

        .comments-count-container {

        @media (max-width: 768px) {

        }
        
        @media (max-width: 480px) {
            .navbar {
                padding: 8px 4%;
            }
            
            .logo {

            }
            
            .search-box {

            }
            
            .search-box input {

            }

            }

            }

            }
            
            .action-buttons {
                gap: 6px;
            }
            
            .like-btn, .share-btn, .comments-btn {
                padding: 4px 8px;
                font-size: 0.8rem;

            }
            
            .like-btn i, .share-btn i, .comments-btn i {

            }
            
            .movies-container {

            }

            .comments-modal-content {
                width: 95%;

            }
        }
    </style>
</head>
<body>
    <nav class="navbar">

    <div class="main-container">

    <!-- Share Modal -->
    <div class="share-modal" id="shareModal">
        <div class="share-modal-content">
            <span class="close-share" id="closeShare">&times;</span>
            <h2>Partager cette vidéo</h2>
            <div class="share-options">
                <a href="#" class="share-option" id="shareFacebook">
                    <div class="share-icon facebook-bg">

                    </div>

    <!-- Comments Modal -->
    <div class="comments-modal" id="commentsModal">
        <div class="comments-modal-content">
            <span class="close-comments" id="closeComments">&times;</span>
            <h2>Commentaires</h2>
            <div class="comment-form">
                <textarea id="commentInput" placeholder="Ajouter un commentaire public..."></textarea>
                <button id="submitComment">Commenter</button>
            </div>
            <div class="comments-list" id="commentsList"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    
    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB77EmeaPTvtXCH4EL-1E1SgmyW6Yz9lLI",
            authDomain: "cinetv257.firebaseapp.com",
            databaseURL: "https://cinetv257-default-rtdb.firebaseio.com",
            projectId: "cinetv257",
            storageBucket: "cinetv257.appspot.com",
            messagingSenderId: "402664770835",
            appId: "1:402664770835:web:1adaea98f40ca609645ee6"
        };
        
        // Initialiser Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ID de l'épisode (identique à la structure NIGHT_HAS_COME)
        const episodeId = "HALLOWEEN_KILLS";

        // Génération de l'ID utilisateur unique
        const userId = localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('userId', userId);

        // Fonctionnalité de recherche
        document.getElementById('searchButton').addEventListener('click', function() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm.trim() !== '') {
                alert('Résultats de recherche pour: ' + searchTerm);
            }
        });

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('searchButton').click();
            }
        });

        // ========= SYSTÈME DE VUES (1 vue/appareil) =========
        const viewsRef = database.ref(`episodes/${episodeId}/views`);

        viewsRef.transaction(currentData => {
            currentData = currentData || { count: 0, devices: {} };
            
            if (!currentData.devices[userId]) {
                currentData.count++;
                currentData.devices[userId] = true;
            }
            
            return currentData;
        });

        viewsRef.on('value', (snapshot) => {
            const data = snapshot.val() || { count: 0 };
            document.getElementById('viewsCount').textContent = data.count;
        });

        // ========= SYSTÈME DE LIKES =========
        const likeButton = document.getElementById('likeButton');
        const likesRef = database.ref(`episodes/${episodeId}/likes`);

        likesRef.on('value', (snapshot) => {
            const data = snapshot.val() || { count: 0, users: {} };
            document.getElementById('likeCount').textContent = data.count;
            likeButton.innerHTML = data.users[userId] 
                ? '<i class="fas fa-heart" style="color:#e94560"></i> <span class="btn-text">J\'aime</span>' 
                : '<i class="far fa-heart"></i> <span class="btn-text">J\'aime</span>';
        });

        likeButton.addEventListener('click', () => {
            likesRef.transaction(data => {
                data = data || { count: 0, users: {} };
                if (data.users[userId]) {
                    data.count--;
                    delete data.users[userId];
                } else {
                    data.count++;
                    data.users[userId] = true;
                }
                return data;
            });
        });

        // ========= SYSTÈME DE COMMENTAIRES =========
        const commentsRef = database.ref(`episodes/${episodeId}/comments`);

        // Mettre à jour le compteur de commentaires
        commentsRef.on('value', (snapshot) => {
            const count = snapshot.numChildren();
            document.getElementById('commentsCount').textContent = count;
        });

        document.getElementById('submitComment').addEventListener('click', () => {
            const text = document.getElementById('commentInput').value.trim();
            if (text) {
                commentsRef.push({
                    text: text,
                    userId: userId,
                    timestamp: Date.now(),
                    userName: "Anonyme"
                });
                document.getElementById('commentInput').value = '';
            }
        });

        // Afficher les commentaires
        function displayComments() {
            commentsRef.orderByChild('timestamp').on('value', (snapshot) => {
                const commentsList = document.getElementById('commentsList');
                commentsList.innerHTML = '';
                snapshot.forEach(child => {
                    const comment = child.val();
                    commentsList.innerHTML += `
                        <div class="comment">
                            <div class="comment-header">
                                <span class="comment-user">${comment.userName}</span>
                                <span class="comment-time">${new Date(comment.timestamp).toLocaleString()}</span>
                            </div>
                            <div class="comment-text">${comment.text}</div>
                        </div>
                    `;
                });
            });
        }

        // Gestion de la fenêtre de partage
        const shareModal = document.getElementById('shareModal');
        const shareButton = document.getElementById('shareButton');
        const closeShare = document.getElementById('closeShare');
        
        shareButton.addEventListener('click', function() {
            shareModal.style.display = 'flex';
        });
        
        closeShare.addEventListener('click', function() {
            shareModal.style.display = 'none';
        });
        
        window.addEventListener('click', function(event) {
            if (event.target === shareModal) {
                shareModal.style.display = 'none';
            }
        });
        
        const shareFacebook = document.getElementById('shareFacebook');
        const shareTwitter = document.getElementById('shareTwitter');
        const shareWhatsapp = document.getElementById('shareWhatsapp');
        const shareLink = document.getElementById('shareLink');
        
        const pageUrl = encodeURIComponent(window.location.href);
        const title = encodeURIComponent('Regardez HALLOWEEN KILLS sur CinéTV');
        
        shareFacebook.addEventListener('click', function(e) {
            e.preventDefault();
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${pageUrl}`, '_blank');
        });
        
        shareTwitter.addEventListener('click', function(e) {
            e.preventDefault();
            window.open(`https://twitter.com/intent/tweet?url=${pageUrl}&text=${title}`, '_blank');
        });
        
        shareWhatsapp.addEventListener('click', function(e) {
            e.preventDefault();
            window.open(`https://wa.me/?text=${title}%20${pageUrl}`, '_blank');
        });
        
        shareLink.addEventListener('click', function(e) {
            e.preventDefault();
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('Lien copié dans le presse-papiers !');
                shareModal.style.display = 'none';
            });
        });

        // Gestion de la fenêtre de commentaires
        const commentsModal = document.getElementById('commentsModal');
        const commentsButton = document.getElementById('commentsButton');
        const closeComments = document.getElementById('closeComments');
        
        commentsButton.addEventListener('click', function() {
            commentsModal.style.display = 'flex';
            displayComments(); // Charger les commentaires quand la modal s'ouvre
        });
        
        closeComments.addEventListener('click', function() {
            commentsModal.style.display = 'none';
        });
        
        window.addEventListener('click', function(event) {
            if (event.target === commentsModal) {
                commentsModal.style.display = 'none';
            }
        });

        // Charger les commentaires au démarrage
        displayComments();
    </script>
</body>
</html>
