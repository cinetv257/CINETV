<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Connectify - Communication en temps réel</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Effet de particules animées */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        /* Conteneur principal */
        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            margin: 20px;
            animation: slideInUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Carte d'authentification */
        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3);
        }

        /* En-tête */
        .auth-header {
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            padding: 50px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1%, transparent 1%);
            background-size: 50px 50px;
            animation: shimmer 20s linear infinite;
        }

        @keyframes shimmer {
            from {
                transform: translateX(0) translateY(0);
            }
            to {
                transform: translateX(-50%) translateY(-50%);
            }
        }

        .logo-icon {
            font-size: 4rem;
            color: white;
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .auth-header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
        }

        /* Corps du formulaire */
        .auth-body {
            padding: 40px 35px;
        }

        /* Indicateur d'onglet */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f0f2f5;
            padding: 5px;
            border-radius: 60px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s ease;
            color: #666;
            font-family: inherit;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            color: white;
            box-shadow: 0 2px 10px rgba(7, 94, 84, 0.3);
        }

        /* Groupes de champs */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            background: #f8f9fa;
        }

        .form-group input:focus {
            border-color: #128c7e;
            background: white;
            box-shadow: 0 0 0 4px rgba(18, 140, 126, 0.1);
        }

        .form-group input:focus + i {
            color: #128c7e;
        }

        /* Bouton de connexion */
        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .auth-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .auth-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(7, 94, 84, 0.3);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        /* État de chargement */
        .auth-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Messages */
        .error-message {
            background: #fee;
            color: #dc3545;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            background: #e8f5e9;
            color: #4caf50;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Pied de page */
        .auth-footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
        }

        .auth-footer p {
            color: #999;
            font-size: 0.75rem;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #666;
            font-size: 0.75rem;
        }

        .feature-item i {
            font-size: 0.8rem;
            color: #128c7e;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-body {
                padding: 30px 25px;
            }
            
            .auth-header {
                padding: 40px 25px;
            }
            
            .logo-icon {
                font-size: 3rem;
            }
            
            .auth-header h1 {
                font-size: 1.5rem;
            }
        }

        /* Style pour le mot de passe */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">
                    <i class="fas fa-comments"></i>
                </div>
                <h1>Connectify</h1>
                <p>Communication audio et chat en temps réel</p>
            </div>
            
            <div class="auth-body">
                <div class="tab-container">
                    <button class="tab-btn active" data-tab="login">
                        <i class="fas fa-sign-in-alt"></i> Connexion
                    </button>
                    <button class="tab-btn" data-tab="register">
                        <i class="fas fa-user-plus"></i> Inscription
                    </button>
                </div>
                
                <div id="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="errorText"></span>
                </div>
                
                <div id="successMessage" class="success-message">
                    <i class="fas fa-check-circle"></i>
                    <span id="successText"></span>
                </div>
                
                <!-- Formulaire de connexion -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Adresse email" autocomplete="email" required>
                    </div>
                    
                    <div class="form-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="current-password" required>
                        <i class="fas fa-eye toggle-password" data-target="loginPassword"></i>
                    </div>
                    
                    <button type="submit" class="auth-btn" id="loginBtn">
                        <i class="fas fa-paper-plane"></i>
                        <span>Se connecter</span>
                    </button>
                </form>
                
                <!-- Formulaire d'inscription -->
                <form id="registerForm" class="auth-form" style="display: none;">
                    <div class="form-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="registerName" placeholder="Nom complet" autocomplete="name" required>
                    </div>
                    
                    <div class="form-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="registerEmail" placeholder="Adresse email" autocomplete="email" required>
                    </div>
                    
                    <div class="form-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="registerPassword" placeholder="Mot de passe (min. 6 caractères)" autocomplete="new-password" required>
                        <i class="fas fa-eye toggle-password" data-target="registerPassword"></i>
                    </div>
                    
                    <div class="form-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="registerConfirmPassword" placeholder="Confirmer le mot de passe" required>
                        <i class="fas fa-eye toggle-password" data-target="registerConfirmPassword"></i>
                    </div>
                    
                    <button type="submit" class="auth-btn" id="registerBtn">
                        <i class="fas fa-user-plus"></i>
                        <span>S'inscrire</span>
                    </button>
                </form>
            </div>
            
            <div class="auth-footer">
                <div class="features">
                    <div class="feature-item">
                        <i class="fas fa-phone-alt"></i>
                        <span>Appels audio</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-comment-dots"></i>
                        <span>Chat en direct</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-users"></i>
                        <span>Présence temps réel</span>
                    </div>
                </div>
                <p>© 2024 Connectify - Communication sécurisée</p>
            </div>
        </div>
    </div>

    <script type="module">
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB77EmeaPTvtXCH4EL-1E1SgmyW6Yz9lLI",
            authDomain: "cinetv257.firebaseapp.com",
            projectId: "cinetv257",
            storageBucket: "cinetv257.appspot.com",
            messagingSenderId: "402664770835",
            appId: "1:402664770835:web:1adaea98f40ca609645ee6"
        };

        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // Initialisation
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // Éléments DOM
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successDiv = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        
        // Boutons
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        
        // Champs de formulaire
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const registerName = document.getElementById('registerName');
        const registerEmail = document.getElementById('registerEmail');
        const registerPassword = document.getElementById('registerPassword');
        const registerConfirmPassword = document.getElementById('registerConfirmPassword');

        // Afficher/masquer le mot de passe
        document.querySelectorAll('.toggle-password').forEach(toggle => {
            toggle.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const input = document.getElementById(targetId);
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                }
            });
        });

        // Créer des particules animées
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                particle.style.animationDuration = `${Math.random() * 4 + 3}s`;
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        // Afficher les erreurs
        function showError(message) {
            errorText.textContent = message;
            errorDiv.style.display = 'flex';
            successDiv.style.display = 'none';
            setTimeout(() => {
                errorDiv.style.animation = 'fadeOut 0.5s ease';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                    errorDiv.style.animation = '';
                }, 500);
            }, 5000);
        }

        // Afficher les succès
        function showSuccess(message) {
            successText.textContent = message;
            successDiv.style.display = 'flex';
            errorDiv.style.display = 'none';
            setTimeout(() => {
                successDiv.style.animation = 'fadeOut 0.5s ease';
                setTimeout(() => {
                    successDiv.style.display = 'none';
                    successDiv.style.animation = '';
                }, 500);
            }, 3000);
        }

        // Animation de chargement
        function setLoading(button, isLoading) {
            if (isLoading) {
                button.classList.add('loading');
                const originalContent = button.innerHTML;
                button.dataset.originalContent = originalContent;
                button.innerHTML = '<span class="spinner"></span><span> Chargement...</span>';
                button.disabled = true;
            } else {
                button.classList.remove('loading');
                button.innerHTML = button.dataset.originalContent;
                button.disabled = false;
            }
        }

        // Redirection avec chargement
        function redirectWithLoading(url) {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                opacity: 0;
                transition: opacity 0.5s ease;
                flex-direction: column;
                gap: 20px;
            `;
            
            const spinner = document.createElement('div');
            spinner.style.cssText = `
                width: 50px;
                height: 50px;
                border: 4px solid rgba(255,255,255,0.3);
                border-top-color: white;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            `;
            
            const text = document.createElement('p');
            text.textContent = 'Connexion en cours...';
            text.style.color = 'white';
            text.style.fontSize = '1.2rem';
            text.style.fontWeight = '500';
            
            overlay.appendChild(spinner);
            overlay.appendChild(text);
            document.body.appendChild(overlay);
            
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 10);
            
            setTimeout(() => {
                window.location.href = url;
            }, 1000);
        }

        // Fonction de connexion (SANS vérification email)
        async function loginUser(email, password) {
            try {
                setLoading(loginBtn, true);
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                showSuccess('Connexion réussie ! Redirection...');
                
                // Mettre à jour la présence dans la base de données
                const userRef = ref(database, `users/${user.uid}`);
                await set(userRef, {
                    uid: user.uid,
                    name: user.displayName || email.split('@')[0],
                    email: email,
                    status: "En ligne",
                    lastSeen: Date.now()
                });
                
                setTimeout(() => {
                    redirectWithLoading('users.html');
                }, 1500);
                
            } catch (error) {
                console.error('Erreur de connexion:', error);
                let message = '';
                switch (error.code) {
                    case 'auth/invalid-email':
                        message = 'Format d\'email invalide.';
                        break;
                    case 'auth/user-disabled':
                        message = 'Ce compte a été désactivé.';
                        break;
                    case 'auth/user-not-found':
                        message = 'Aucun compte trouvé avec cet email.';
                        break;
                    case 'auth/wrong-password':
                        message = 'Mot de passe incorrect.';
                        break;
                    default:
                        message = 'Erreur lors de la connexion. Veuillez réessayer.';
                }
                showError(message);
                setLoading(loginBtn, false);
            }
        }

        // Fonction d'inscription (SANS vérification email)
        async function registerUser(name, email, password, confirmPassword) {
            // Validation
            if (password !== confirmPassword) {
                showError('Les mots de passe ne correspondent pas.');
                return;
            }
            
            if (password.length < 6) {
                showError('Le mot de passe doit contenir au moins 6 caractères.');
                return;
            }
            
            if (!name.trim()) {
                showError('Veuillez entrer votre nom complet.');
                return;
            }
            
            try {
                setLoading(registerBtn, true);
                
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Mettre à jour le profil avec le nom
                await updateProfile(user, {
                    displayName: name
                });
                
                // PAS D'ENVOI D'EMAIL DE VÉRIFICATION !
                // L'utilisateur est directement actif
                
                // Sauvegarder les données utilisateur dans Realtime Database
                const userRef = ref(database, `users/${user.uid}`);
                await set(userRef, {
                    uid: user.uid,
                    name: name,
                    email: email,
                    status: "En ligne",
                    createdAt: Date.now(),
                    lastSeen: Date.now()
                });
                
                showSuccess('Inscription réussie ! Redirection en cours...');
                
                // Redirection après inscription réussie
                setTimeout(() => {
                    redirectWithLoading('users.html');
                }, 1500);
                
            } catch (error) {
                console.error('Erreur d\'inscription:', error);
                let message = '';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        message = 'Cette adresse email est déjà utilisée.';
                        break;
                    case 'auth/invalid-email':
                        message = 'Format d\'email invalide.';
                        break;
                    case 'auth/weak-password':
                        message = 'Le mot de passe est trop faible (minimum 6 caractères).';
                        break;
                    default:
                        message = 'Erreur lors de l\'inscription. Veuillez réessayer.';
                }
                showError(message);
                setLoading(registerBtn, false);
            }
        }

        // Changement d'onglet
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (tab === 'login') {
                    loginForm.style.display = 'block';
                    registerForm.style.display = 'none';
                } else {
                    loginForm.style.display = 'none';
                    registerForm.style.display = 'block';
                }
                
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
            });
        });

        // Écouteurs d'événements
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            
            if (!email || !password) {
                showError('Veuillez remplir tous les champs.');
                return;
            }
            
            loginUser(email, password);
        });
        
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = registerName.value.trim();
            const email = registerEmail.value.trim();
            const password = registerPassword.value;
            const confirmPassword = registerConfirmPassword.value;
            
            if (!name || !email || !password || !confirmPassword) {
                showError('Veuillez remplir tous les champs.');
                return;
            }
            
            registerUser(name, email, password, confirmPassword);
        });
        
        // Animation de fadeOut
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                from { opacity: 1; }
                to { opacity: 0; display: none; }
            }
        `;
        document.head.appendChild(style);
        
        // Vérifier si l'utilisateur est déjà connecté (redirection directe)
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Pas de vérification d'email, on redirige directement
                console.log('Utilisateur déjà connecté:', user.email);
                redirectWithLoading('users.html');
            }
        });
    </script>
</body>
</html>
